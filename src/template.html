<!doctype html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Todo List</title>
</head>
<body>
    <div class="container">
        <div class="title">// TO-DO<img id="todo-img" src="./assets/square-check-big.svg" alt="todo IMG"></div>
        <div class="sidebar">
            <ul>
                <li id="add-task"><img src="./assets/circle-plus.svg" alt="addTask">
                    <div>Add Task</div>
                </li>
                <li id="home"><img src="./assets/house.svg" alt="home">
                    <div>Home</div>
                </li>
                <li id="projects"><img src="./assets/folder-dot.svg" alt="Projects">
                    <div>Projects</div>
                </li>
            </ul>
        </div>
        <div id="content"></div>
        <div class="footer">The Odin Project © Zak Chebaane</div>
    </div>
    <dialog id="todoModal">
        <button id="closeTodo">X</button>
        <form method="dialog" class="modalForm">
            <div class="formBlocks">
                <label for="name-todo">Title</label>
                <input id="name-todo" type="text">
            </div>
            <div class="formBlocks">
                <label for="desc-todo">Description</label>
                <input id="desc-todo" type="text">
            </div>
            <div class="formBlocks">
                <label for="dueDate-todo">Due Date</label>
                <input id="dueDate-todo" type="text">
            </div>
            <div class="formBlocks">
                <label for="priority-todo">Priority</label>
                <input id="priority-todo" type="text">
            </div>
            <button id="submit-btn" type="submit">Add Task</button>
        </form>
    </dialog>
</body>
</html>
